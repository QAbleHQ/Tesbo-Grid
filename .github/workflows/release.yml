name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  images:
    name: Build & push images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: tesbox-executions-app-api
            dockerfile: grid-backend/Dockerfile
          - image: tesbox-executions-api
            dockerfile: grid-runner-api/Dockerfile
          - image: tesbox-executions-frontend
            dockerfile: grid-frontend/Dockerfile
          - image: tesbox-executions-selenium-proxy
            dockerfile: grid-selenium-proxy/Dockerfile
          - image: tesbox-executions-worker
            dockerfile: grid-runner-workers/Dockerfile
          - image: tesbox-executions-worker-python
            dockerfile: grid-runner-workers/Dockerfile.python
          - image: tesbox-executions-worker-java
            dockerfile: grid-runner-workers/Dockerfile.java
          - image: tesbox-executions-worker-selenium-java
            dockerfile: grid-runner-workers/Dockerfile.selenium-java
          - image: tesbox-executions-worker-selenium-python
            dockerfile: grid-runner-workers/Dockerfile.selenium-python
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve tag
        id: meta
        run: |
          RAW="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${RAW#v}" >> "$GITHUB_OUTPUT"
          echo "repo=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/tesbo-grid" >> "$GITHUB_OUTPUT"
      - name: Build & push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          # arm64 omitted: the Playwright base image build is amd64-focused.
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.repo }}/${{ matrix.image }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.repo }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    # Requires an NPM_TOKEN secret with publish rights to the @tesbox scope.
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Publish @tesbox/cli
        working-directory: grid-cli
        run: npm publish --access public || echo "skip (already published or no token)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @tesbox/grid-installer
        working-directory: deploy/installer
        run: npm publish --access public || echo "skip (already published or no token)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

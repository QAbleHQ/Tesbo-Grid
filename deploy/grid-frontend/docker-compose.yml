services:
  frontend:
    image: ${CONTAINER_REGISTRY}/tesbox-executions-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - app.env
    ports:
      - "127.0.0.1:3100:3100"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3100').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

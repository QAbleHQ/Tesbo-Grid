services:
  app-api:
    image: ${CONTAINER_REGISTRY}/tesbox-executions-app-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - app.env
    environment:
      - PORT=7100
    ports:
      - "127.0.0.1:7100:7100"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:7100/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

{{- $fn := include "tesbo.fullname" . -}}
{{- if .Values.database.bundled.enabled }}
# In-cluster Postgres for trials only. Use a managed database in production.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fn }}-postgres
  labels: {{- include "tesbo.labels" . | nindent 4 }}
spec:
  serviceName: {{ $fn }}-postgres
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/component: postgres, app.kubernetes.io/instance: {{ .Release.Name }} }
  template:
    metadata:
      labels: { app.kubernetes.io/component: postgres, app.kubernetes.io/instance: {{ .Release.Name }} }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_USER, value: postgres }
            - { name: POSTGRES_PASSWORD, value: postgres }
            - { name: POSTGRES_DB, value: tesbo_grid }
          ports: [{ containerPort: 5432 }]
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
          # Create the second (execution) database on first start.
          lifecycle:
            postStart:
              exec:
                command: ["sh", "-c", "until pg_isready -U postgres; do sleep 2; done; psql -U postgres -tc \"SELECT 1 FROM pg_database WHERE datname='tesbo_execution'\" | grep -q 1 || psql -U postgres -c 'CREATE DATABASE tesbo_execution'"]
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: {{ .Values.database.bundled.storage }} } }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fn }}-postgres
  labels: {{- include "tesbo.labels" . | nindent 4 }}
spec:
  selector: { app.kubernetes.io/component: postgres, app.kubernetes.io/instance: {{ .Release.Name }} }
  ports: [{ port: 5432, targetPort: 5432 }]
{{- end }}
{{- if .Values.redis.bundled.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fn }}-redis
  labels: {{- include "tesbo.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/component: redis, app.kubernetes.io/instance: {{ .Release.Name }} }
  template:
    metadata:
      labels: { app.kubernetes.io/component: redis, app.kubernetes.io/instance: {{ .Release.Name }} }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{ containerPort: 6379 }]
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fn }}-redis
  labels: {{- include "tesbo.labels" . | nindent 4 }}
spec:
  selector: { app.kubernetes.io/component: redis, app.kubernetes.io/instance: {{ .Release.Name }} }
  ports: [{ port: 6379, targetPort: 6379 }]
{{- end }}

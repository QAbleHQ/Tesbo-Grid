services:
  execution-api:
    image: ${CONTAINER_REGISTRY}/tesbox-executions-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - app.env
    environment:
      - PORT=7420
    ports:
      - "127.0.0.1:7420:7420"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:7420/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

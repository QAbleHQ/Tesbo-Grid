sonar.projectKey=Tesbo-Grid
sonar.projectName=Tesbo-Grid

# Source layout (monorepo: workspaces are top-level package dirs)
sonar.sources=grid-backend/src,grid-frontend/app,grid-frontend/components,grid-frontend/lib,grid-frontend/types,grid-runner-api,grid-runner-workers,grid-selenium-proxy,grid-shared,grid-cli,scripts

# Exclusions: build artifacts, generated files, vendored deps, and anything that shouldn't count toward quality metrics.
# `**/Dockerfile.*` excludes the worker-variant Dockerfiles (Dockerfile.java, Dockerfile.python, etc.) — the `.java`/`.python`
# suffixes trick Sonar's Java CPD into trying to parse them as Java, which fails on the `FROM` instruction.
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.next/**,**/coverage/**,**/*.min.js,**/migrations/**,**/patches/**,grid-frontend/public/**,**/*.tsbuildinfo,grid-frontend/components/ui/**,**/Dockerfile.*

# Test file conventions used in this repo
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.spec.ts,**/*.spec.tsx,**/*.spec.js

# Encoding
sonar.sourceEncoding=UTF-8

# Disable Java analysis. The repo has no .java source; the `Dockerfile.java` /
# `Dockerfile.python` worker-variant files would otherwise be picked up by both
# the Java analyzer (extension match) and the IaC Docker sensor (filename match),
# causing duplicate-metric errors and CPD failures on the `FROM` token.
sonar.lang.patterns.java=**/disabled-java-analysis.notreal
